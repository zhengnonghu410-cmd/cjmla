name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger from GitHub web UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-dev \
            openjdk-17-jdk-headless \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev

      - name: Install Buildozer
        run: |
          pip install buildozer "cython<3.0"

      - name: Build APK
        run: |
          buildozer android debug
        env:
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: ~/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-mario-apk
          path: bin/*.apk
          retention-days: 30
